<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>锂矿板块相对强度排名</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0f19;--card:#111827;--border:#1e293b;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --up:#ef4444;--down:#22c55e;--accent:#3b82f6;
  --up-bg:rgba(239,68,68,.08);--down-bg:rgba(34,197,94,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.wrap{max-width:1280px;margin:0 auto;padding:24px 20px}

/* Header */
header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px}
header h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.refresh-box{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text3)}
.refresh-box button{background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:13px;transition:all .2s}
.refresh-box button:hover{border-color:var(--accent);color:var(--accent)}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:24px}

/* Table */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:720px}
thead{position:sticky;top:0;z-index:1}
th{padding:10px 12px;text-align:center;font-weight:500;color:var(--text3);font-size:12px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);background:var(--card);white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
th .arrow{margin-left:4px;font-size:10px;opacity:.4}
th.active .arrow{opacity:1;color:var(--accent)}
td{padding:10px 12px;text-align:center;border-bottom:1px solid rgba(30,41,59,.4);white-space:nowrap}
tbody tr{transition:background .15s}
tbody tr:hover{background:rgba(59,130,246,.05)}
td.name-cell{text-align:left;font-weight:500;color:var(--text)}
td.price-cell{font-variant-numeric:tabular-nums}
.rps-val{font-variant-numeric:tabular-nums;font-weight:500}
.rps-high{color:var(--up)}
.rps-mid{color:#f59e0b}
.rps-low{color:var(--down)}
.change-up{color:var(--up);font-weight:500}
.change-down{color:var(--down);font-weight:500}
.change-same{color:var(--text3)}

/* Selector */
.selector{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.selector label{display:flex;align-items:center;gap:5px;cursor:pointer;font-size:13px;color:var(--text2);padding:5px 10px;border-radius:6px;border:1px solid var(--border);transition:all .15s;user-select:none}
.selector label:hover{border-color:var(--accent)}
.selector label.checked{border-color:var(--accent);background:rgba(59,130,246,.1);color:var(--text)}
.selector input{display:none}
.selector .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.select-all-btn{background:transparent;border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:5px 12px;font-size:13px;cursor:pointer;transition:all .15s}
.select-all-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Chart */
#chart{width:100%;height:520px}
.chart-empty{display:flex;align-items:center;justify-content:center;height:520px;color:var(--text3);font-size:15px}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;height:400px;color:var(--text3);font-size:15px;gap:8px}
.spinner{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Error */
.error-box{text-align:center;padding:40px;color:#f87171}
.error-box button{margin-top:12px;background:var(--card);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:8px 20px;cursor:pointer;font-size:14px}
.error-box button:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>锂矿板块相对强度排名</h1>
    <div class="refresh-box">
      <span id="updateTime">加载中...</span>
      <button onclick="refreshData()">刷新</button>
    </div>
  </header>

  <div id="mainContent" style="display:none">
    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:50px">排名</th>
              <th style="text-align:left">股票</th>
              <th>现价</th>
              <th data-sort="1d" class="active">1日RPS<span class="arrow">▼</span></th>
              <th>1日变化</th>
              <th data-sort="5d">5日RPS<span class="arrow">▼</span></th>
              <th>5日变化</th>
              <th data-sort="20d">20日RPS<span class="arrow">▼</span></th>
              <th>20日变化</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <div class="selector" id="selector"></div>

    <div class="card">
      <div id="chart"></div>
      <div class="chart-empty" id="chartEmpty" style="display:none">请选择至少一只股票</div>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span>加载数据中...</span>
  </div>

  <div class="error-box" id="errorBox" style="display:none">
    <p id="errorMsg"></p>
    <button onclick="refreshData()">重试</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
